<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="page-title">Blog Post</title>
    <link rel="stylesheet" href="style.css">
    
</head>

<body>
 
    <article class="post-container">
        <h1 id="post-title"></h1>
        <p id="post-date"></p>
        <img id="post-image" src="" alt="">
        <div id="post-content"></div>
    </article>

    <script src="data.js"></script>
    <script>
        // 1. Get the ID from the URL (e.g., 'nimbus-2026')
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        // 2. Find the matching post in our data.js
        const post = blogPosts.find(p => p.id === postId);

        // 3. Inject the content into the HTML
        if (post) {
            document.getElementById('page-title').innerText = post.title;
            document.getElementById('post-title').innerText = post.title;
            document.getElementById('post-date').innerText = post.date;
            document.getElementById('post-image').src = post.image;
            document.getElementById('post-content').innerHTML = post.content;
        } else {
            document.body.innerHTML = "<h1>Post Not Found</h1>";
        }
    </script>
</body>
</html>
